# Copy this to config.toml (gitignored) and adjust as needed.
# Every provider's API key comes from an env var, never from this file.

[server]
host = "0.0.0.0"
port = 8080
# Ceiling on an inbound request body, in bytes, enforced before a handler
# ever parses it. axum's Json/Bytes extractors already refuse anything
# over 2 MB even with this left at its default, but 2 MB is tight for a
# legitimate multimodal request -- an inline base64-encoded image/PDF
# alone adds ~33% overhead over its raw size.
# max_body_bytes = 20971520  # 20 MiB, this is the default
# Uncomment to require clients to send `Authorization: Bearer <token>`
# where <token> is the value of the named env var. Any key from
# `[[clients]]` below also authenticates, independent of this field.
# api_key_env = "RUSTY_PROVIDER_API_KEY"
# Requests-per-minute limit for callers not matched to a `[[clients]]`
# entry, bucketed by source IP. Unset (the default) means no limit for
# such callers — rate limiting is entirely opt-in.
# default_rate_limit_rpm = 60
# Uncomment to enable the admin API (GET /v1/admin/clients, POST
# /v1/admin/clients/{name}/reset-spend), unlocked by this separate token --
# a client key that authenticates chat completions does NOT also unlock
# this. Leaving it unset disables the admin API entirely (404s, as if the
# routes didn't exist).
# admin_key_env = "RUSTY_PROVIDER_ADMIN_KEY"

# --- Providers -------------------------------------------------------------
# `kind` is one of: "openai" (any OpenAI-compatible /chat/completions API),
# "anthropic", or "gemini". A provider is skipped at startup (with a warning)
# if its api_key_env isn't set, so it's fine to leave providers you don't
# use in this file.
#
# `zdr` (default false) self-declares that you have a Zero Data Retention
# agreement with this provider — the router trusts this flag and never
# verifies it against the provider. Only consulted for requests that set
# `"provider": {"zdr": true}`. Confirm your actual contract terms with the
# provider before relying on this for anything sensitive.
#
# `no_training` (default false) self-declares that this provider does not
# use submitted data to train its models — a separate axis from `zdr`: a
# provider can retain data without training on it, or train on it without
# retaining it beyond the request. Only consulted for requests that set
# `"provider": {"data_collection": true}`. Same trust model as `zdr` —
# self-declared, never verified.
#
# `requests_per_minute` (optional) self-throttles this router's own calls
# to that provider, so it doesn't exceed limits it already knows about and
# get 429'd/banned. When the bucket is empty, the router treats it exactly
# like a retryable provider error and falls back to the next candidate in
# the chain — it does not queue/wait.
#
# A request can bring its own key for a configured provider instead of using
# this file's api_key_env, via `"provider": {"byok": {"openai": "sk-..."}}`
# -- the provider still needs a [providers.X] entry here (for kind/base_url),
# this only swaps the credential. See the README's "BYOK" section.

[providers.openai]
kind = "openai"
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
# zdr = true
# no_training = true
# requests_per_minute = 500
# Total per-request timeout in seconds (connect + send + read the full
# response, including a streamed one). Defaults to 300 -- generous enough
# for a slow completion or a long-running stream, but still bounds a
# connection that hangs forever.
# timeout_secs = 300

[providers.anthropic]
kind = "anthropic"
base_url = "https://api.anthropic.com"
api_key_env = "ANTHROPIC_API_KEY"
# zdr = true
# no_training = true

[providers.gemini]
kind = "gemini"
base_url = "https://generativelanguage.googleapis.com"
api_key_env = "GEMINI_API_KEY"

[providers.groq]
kind = "openai"
base_url = "https://api.groq.com/openai/v1"
api_key_env = "GROQ_API_KEY"

[providers.together]
kind = "openai"
base_url = "https://api.together.xyz/v1"
api_key_env = "TOGETHER_API_KEY"

[providers.fireworks]
kind = "openai"
base_url = "https://api.fireworks.ai/inference/v1"
api_key_env = "FIREWORKS_API_KEY"

# --- Route aliases -----------------------------------------------------------
# A named fallback chain of "provider/model" entries. Clients pass the alias
# as `model` and the router tries each entry in order, falling back on
# rate limits / timeouts / 5xx errors. Clients can also bypass aliases
# entirely and address a provider/model directly, e.g. "openai/gpt-4o".

[[routes]]
alias = "smart"
chain = [
    "anthropic/claude-sonnet-5",
    "openai/gpt-4o",
    "gemini/gemini-2.0-flash",
]

[[routes]]
alias = "fast"
chain = [
    "groq/llama-3.3-70b-versatile",
    "together/meta-llama/Llama-3.3-70B-Instruct-Turbo",
    "fireworks/accounts/fireworks/models/llama-v3p3-70b-instruct",
]

# --- Pricing (optional) ------------------------------------------------------
# Static, operator-maintained prompt-token pricing (USD per million tokens),
# keyed by "provider/model" to match `[[routes]]` chain entries. This is only
# consulted when a request sets `"provider": {"sort": "price"}` — it's not a
# live pricing feed, so keep these numbers current yourself. Entries with no
# pricing row sort last. Figures below are illustrative, not guaranteed
# current — check each provider's own pricing page.
#
# `cache_read_per_million`/`cache_write_per_million` are optional, for
# requests that use prompt caching (see the README's "Prompt caching"
# section) -- they price the portion of `prompt_tokens` served from, or
# newly written to, a cache. Both default to `prompt_per_million` (no
# assumed discount/premium) when left unset.

[[pricing]]
model = "anthropic/claude-sonnet-5"
prompt_per_million = 3.0
completion_per_million = 15.0
# A cache read costs a tenth of a fresh prompt token; a cache write (5-minute
# TTL) costs 25% more than one -- check Anthropic's own pricing page for
# current figures before relying on these.
cache_read_per_million = 0.3
cache_write_per_million = 3.75
# Optional: this model's context window in tokens. Purely informational --
# surfaced at GET /v1/models for clients picking a model by capacity, not
# enforced against actual request size.
context_length = 200000

[[pricing]]
model = "openai/gpt-4o"
prompt_per_million = 2.5
completion_per_million = 10.0

[[pricing]]
model = "gemini/gemini-2.0-flash"
prompt_per_million = 0.1
completion_per_million = 0.4

[[pricing]]
model = "groq/llama-3.3-70b-versatile"
prompt_per_million = 0.59
completion_per_million = 0.79

# --- Clients (optional) -------------------------------------------------------
# Named inbound callers, each with their own API key and rate limit,
# independent of (and in addition to) `server.api_key_env`. Presenting a
# client's key both authenticates the request and buckets its rate limit
# under that client's name rather than the source-IP fallback. Skipped
# (with a warning) if its api_key_env isn't set, same as providers.

# Each client can also cap its own spend with `budget_usd` -- once its
# tracked cost_usd (the same figure GET /v1/usage reports, computed from
# [[pricing]]) reaches this many US dollars for the current
# `budget_period`, further requests get 402 until the period resets.
# `budget_period` is "total" (a lifetime cap, the default), "daily"
# (resets at each UTC calendar-day boundary), "weekly" (resets every 7
# days counted from the Unix epoch, not aligned to a calendar weekday), or
# "monthly" (resets at the start of each calendar month, UTC). Omit
# `budget_usd` entirely for an unrestricted client, same as leaving it
# commented out.
# Like everything else cost-related, this only tracks requests to models
# with a [[pricing]] entry -- unpriced requests don't count against it.

# [[clients]]
# name = "hermes"
# api_key_env = "CLIENT_HERMES_API_KEY"
# requests_per_minute = 60
# budget_usd = 50.0
# budget_period = "monthly"
#
# [[clients]]
# name = "openclaw"
# api_key_env = "CLIENT_OPENCLAW_API_KEY"
# requests_per_minute = 120

# Clients can also be created, updated, or deleted at runtime -- with no
# config-file edit or restart -- via the admin API (POST/PATCH/DELETE
# /v1/admin/clients, see the README's "Admin API" section), once
# server.admin_key_env above is set. Runtime-provisioned clients are
# in-memory only: they don't survive a restart and aren't written back to
# this file, unlike the [[clients]] entries above.

# `organization` and `workspace` group clients for the admin API's
# GET /v1/admin/organizations rollup -- purely labels otherwise, with no
# effect on chat completions. `role = "admin"` additionally lets a
# client's own API key authenticate to /v1/admin/* itself, scoped to
# clients sharing its `organization` (it can't see or manage any other
# organization's clients, unlike server.admin_key_env above, which always
# sees every client). See the README's "Organizations, workspaces &
# roles" section.

# [[clients]]
# name = "acme-admin"
# api_key_env = "CLIENT_ACME_ADMIN_API_KEY"
# requests_per_minute = 60
# organization = "acme-corp"
# workspace = "prod"
# role = "admin"

# --- Persistence (optional) ---------------------------------------------------
# By default, GET /v1/usage's cumulative request/token/cost totals and each
# client's budget_usd spend tracking both live only in memory: they reset on
# restart and each process only knows about its own traffic. Uncomment one of
# the two backends below to persist them instead. An unreachable/misconfigured
# backend is a startup warning, not a hard failure -- the router falls back to
# in-memory-only tracking rather than refusing to start.

# Backend 1: a single SQLite file (created automatically if it doesn't
# exist). Restarts keep their history, and multiple rusty_provider processes
# pointed at the same file report a consistent combined total. This is a
# single file, not a distributed database: fine for multiple processes on one
# host or a shared local volume, not for processes spread across different
# machines over a network filesystem.

# [persistence]
# backend = "sqlite"
# sqlite_path = "usage.db"

# Backend 2: a shared Postgres database, reachable over the network -- the
# way to get usage/spend tracking consistent across multiple *hosts*, not
# just multiple processes on one. Tables are created automatically on first
# use. Connections are unencrypted by default (postgres_tls = "disable"); set
# postgres_tls = "require" to encrypt the connection, verified against the
# host's native root certificate store (the same one reqwest trusts for
# outbound provider calls). Use a trusted network, an external tunnel, or
# postgres_tls = "require" -- never send this over an untrusted network in
# the clear.

# [persistence]
# backend = "postgres"
# postgres_url_env = "DATABASE_URL"
# postgres_tls = "require"

# --- Webhook (optional) --------------------------------------------------------
# Without this, a client crossing its budget_usd only surfaces as a 402 on its
# next request and the client_budget_rejections_total Prometheus counter -- no
# push notification an operator can wire up proactively. Uncomment to have this
# router POST a JSON event to `url` whenever a client's spend crosses its budget
# ("budget_exceeded") or an operator manually resets a client's spend via the
# admin API ("budget_reset"). Delivery is fire-and-forget: a slow or
# unreachable receiver never adds latency to the request that triggered the
# event, and a delivery failure is only logged, never surfaced to the client.

# [webhook]
# url = "https://hooks.example.com/rusty-provider"
# auth_header_env = "WEBHOOK_AUTH_HEADER"  # e.g. set to "Bearer <token>"
# timeout_secs = 10  # optional, this is the default

# --- Guardrails (optional) ------------------------------------------------------
# Regex-based content guardrails, checked against every request's message text
# before it's ever dispatched to a provider. Scoped globally (server-wide) --
# rusty has no workspace/org concept to scope these to individually. Each entry's
# `action` is "block" (reject the request with 400 if `pattern` matches anywhere)
# or "redact" (replace every match with `replacement`, default "[redacted]",
# before dispatch). Multiple [[guardrails]] apply in order -- a later guardrail
# sees whatever an earlier "redact" already rewrote. An invalid regex `pattern`
# is skipped at startup with a warning, same as a misconfigured provider/client.

# [[guardrails]]
# name = "no-ssn"
# pattern = '\d{3}-\d{2}-\d{4}'
# action = "block"

# [[guardrails]]
# name = "no-email"
# pattern = '\S+@\S+'
# action = "redact"
# replacement = "<email>"

# --- Moderation (optional) --------------------------------------------------------
# Checks every request's message text against an external moderation endpoint
# before it's ever dispatched to a provider, blocking anything flagged with 400.
# A different axis from [[guardrails]] above: guardrails are your own regex
# patterns, this defers the judgment call (hate, violence, self-harm, etc.) to a
# third-party classifier. Only OpenAI's /moderations endpoint (or a compatible
# one -- base_url is configurable) is supported today. Runs after guardrails, so
# a guardrail's own redaction is what gets checked. If the moderation backend
# itself is unreachable or errors, the request is let through (fail open) and the
# failure is only logged -- a moderation outage shouldn't take down chat
# completions entirely.

# [moderation]
# api_key_env = "OPENAI_API_KEY"  # can reuse [providers.openai]'s key
# base_url = "https://api.openai.com/v1"  # optional, this is the default
# model = "omni-moderation-latest"        # optional, this is the default
# timeout_secs = 10                       # optional, this is the default

# --- Web search (optional) --------------------------------------------------------
# A request setting `"web_search": true` triggers a live search (via Brave
# Search's API, or a compatible one -- base_url is configurable), using the
# latest user message's own text as the query. The top results are prepended
# as plain-text context onto that same message before dispatch -- and before
# [[guardrails]]/[moderation] above run, so both see whatever the search
# actually returned. Silently a no-op (request goes out unmodified) when
# web_search isn't requested, [web_search] isn't configured, there's no
# user-message text to search with, or results come back empty. A
# search-backend failure (unreachable, non-2xx, bad body) is the same fail
# open as an unreachable moderation backend -- logged, request proceeds
# unmodified.

# [web_search]
# api_key_env = "BRAVE_SEARCH_API_KEY"
# base_url = "https://api.search.brave.com/res/v1/web/search"  # optional, this is the default
# max_results = 5                                                # optional, this is the default
# timeout_secs = 10                                              # optional, this is the default

# --- Response cache (optional) -----------------------------------------------------
# An in-memory, exact-match cache of non-streaming chat completions, keyed by a
# hash of the entire incoming request -- any difference at all (a different
# message, a different sampling parameter, a different `provider` preference)
# is a cache miss. No semantic/fuzzy matching. Only [cache] presence turns this
# on; it's fully disabled (and costs nothing) when this section is absent.
# Streaming requests always bypass the cache. A cache hit skips dispatch to the
# provider entirely -- and skips re-recording usage/cost/latency metrics for
# that request, since they were already recorded once when the response was
# first computed.

# [cache]
# ttl_secs = 300        # optional, this is the default -- how long an entry stays fresh
# max_entries = 1000    # optional, this is the default -- oldest entry evicted once over capacity

# --- Presets (optional) ----------------------------------------------------------
# A named, reusable bundle of request defaults, referenced from a request via
# `"preset": "<name>"`. Every field here is a per-field default -- whatever the
# request itself already sets always wins -- except `model`, which overrides the
# request's `model` outright when set, since centralizing model selection is the
# point of a preset. `model` can itself be a [[routes]] alias, so presets pair
# naturally with route aliases. `system_prompt` is prepended as a new system
# message, but only if the request has no system message of its own.

# [[presets]]
# name = "support-bot"
# model = "smart"
# system_prompt = "You are a helpful, concise support agent."
# temperature = 0.2
# max_tokens = 500
#
# [presets.provider]
# only = ["anthropic", "openai"]

# --- Auto-routing (optional) ------------------------------------------------------
# `model: "auto"` in a request routes it to one of three tiers, picked by a
# heuristic (not ML) complexity score -- roughly OpenRouter's `openrouter/auto`.
# Each tier's model can be a "provider/model" string or a [[routes]] alias, same
# as `model` anywhere else. The score is an estimated-token count (same
# tokenizer-free `chars / 4` heuristic used elsewhere in this router) plus flat
# bonuses for signals that tend to mean a harder task -- multi-turn context, code
# in the conversation, tool use, requested reasoning, or a JSON-schema output
# constraint. There's no fixed unit or universal threshold: simple_max_score/
# medium_max_score are something to tune against your own traffic. Without
# [auto_routing] configured, "auto" isn't special-cased -- it resolves like any
# other unrecognized alias (400).
#
# A request can also set `"provider": {"auto_bias": "cost"}` or `"quality"` to
# shift both thresholds for just that request (doubled for "cost", halved for
# "quality") without touching the operator's own configured defaults.

# [auto_routing]
# simple_model = "openai/gpt-4o-mini"
# medium_model = "smart"
# complex_model = "anthropic/claude-opus-4-8"
# simple_max_score = 200
# medium_max_score = 800
